name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ] && [ -s requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 --count --show-source --statistics .

      - name: Run tests
        run: |
          PYTHONPATH=. python3 test/test_generator.py

  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install bandit
        run: pip install bandit[sarif]

      - name: Run Bandit (report only, no CI failure)
        run: |
          bandit -r . -c bandit.yaml -f sarif -o bandit-results.sarif --exit-zero
          bandit -r . -c bandit.yaml -f json  -o bandit-results.json  --exit-zero

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload JSON report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-results.json
