name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from metadata.txt
        id: meta
        run: |
          VERSION=$(grep '^version=' metadata.txt | head -1 | cut -d'=' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          TAG="${GITHUB_REF_NAME}"
          if [ "$TAG" != "v${VERSION}" ]; then
            echo "::error::Tag '$TAG' does not match metadata.txt version 'v${VERSION}'"
            exit 1
          fi

      - name: Extract changelog for current version
        id: changelog
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^changelog=/ { in_block=1; next }
            /^[a-z]/ && !/^changelog=/ { in_block=0 }
            in_block {
              line = $0
              gsub(/^    /, "", line)
              if (match(line, "^[0-9]+\\.[0-9]+")) {
                capture = (index(line, ver) == 1) ? 1 : 0
                next
              }
              if (capture) {
                if (body != "") body = body "\n"
                body = body line
              }
            }
            END { print body }
          ' metadata.txt)

          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          git archive --prefix=comapeo_smp/ -o "comapeo_smp_v${VERSION}.zip" HEAD
          echo "Archive contents:"
          zipinfo -1 "comapeo_smp_v${VERSION}.zip" | head -20
          echo "Total files: $(zipinfo -1 "comapeo_smp_v${VERSION}.zip" | wc -l)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: comapeo_smp_v${{ steps.meta.outputs.version }}
          path: comapeo_smp_v${{ steps.meta.outputs.version }}.zip
          retention-days: 90

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: comapeo_smp_v${{ steps.meta.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
