[flake8]
max-line-length = 120
ignore =
    E121,
    E122,
    E123,
    E124,
    E125,
    E126,
    E127,
    E128,
    E203,
    E226,
    E302,
    E303,
    E305,
    E401,
    W503,
    W504
exclude =
    .git,
    __pycache__,
    build,
    dist,
    *.egg-info,
    help/source/conf.py,
    .env,
    .venv
per-file-ignores =
    __init__.py: E402
    comapeo_smp.py: E402
    comapeo_smp_provider.py: E402
    comapeo_smp_algorithm.py: E402
    comapeo_smp_generator.py: E402,F401
    test/test_generator.py: E402,F401,E265,E306,E741,F841
    test/test_qgis_environment.py: E402
    test/test_translations.py: E402
    test/test_init.py: E402
    test/qgis_interface.py: E402,E265
    test/utilities.py: E402,E265
    scripts/test-qgis-headless.py: E402,F401
    plugin_upload.py: F821,E402
